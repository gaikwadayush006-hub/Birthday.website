<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special 💖</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: #0d0d0d;
    color:#fff;
    overflow-x:hidden;
}

/* Background gradient animation */
body::before{
    content:'';
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle at 20% 30%, #ff0077, transparent),
                radial-gradient(circle at 80% 70%, #00d4ff, transparent),
                radial-gradient(circle at 50% 50%, #6a00ff, transparent);
    animation: moveBG 15s infinite alternate;
    z-index:-1;
    filter: blur(100px);
}

@keyframes moveBG{
    0%{transform:translate(0,0);}
    100%{transform:translate(-20%, -10%);}
}

/* Sections */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* Glass card */
.card{
    background: rgba(255,255,255,0.05);
    border-radius:20px;
    padding:40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
    max-width:600px;
}

/* Title */
h1{
    font-size:3rem;
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    opacity:0.8;
}

/* Button */
button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background: linear-gradient(45deg,#ff0077,#6a00ff);
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.1);
}

/* Floating hearts */
.heart{
    position:absolute;
    color:#ff4d88;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* Fade animation */
.fade{
    opacity:0;
    transform:translateY(30px);
    transition:1s;
}
.show{
    opacity:1;
    transform:translateY(0);
}

/* Music button */
.music{
    position:fixed;
    top:20px;
    right:20px;
    background:#111;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="music" onclick="toggleMusic()">🎵</div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- Section 1 -->
<section>
    <div class="card fade">
        <h1>Hey You 💖</h1>
        <p>I made something special... just for you</p>
        <button onclick="scrollNext()">Start Journey</button>
    </div>
</section>

<!-- Section 2 -->
<section>
    <div class="card fade">
        <h1>Happy Birthday 🎂</h1>
        <p>You are not just special…<br>you are my everything.</p>
    </div>
</section>

<!-- Section 3 -->
<section>
    <div class="card fade">
        <h1>Memories ✨</h1>
        <p>Every moment with you feels like magic.</p>
    </div>
</section>

<!-- Section 4 -->
<section>
    <div class="card fade">
        <h1>Forever 💞</h1>
        <p>No matter what happens,<br>I will always be there for you.</p>
    </div>
</section>

<!-- Section 5 -->
<section>
    <div class="card fade">
        <h1>I Love You ❤️</h1>
        <p>Today, tomorrow, and always.</p>
    </div>
</section>

<script>

/* Scroll next */
function scrollNext(){
    window.scrollBy({top: window.innerHeight, behavior:'smooth'});
}

/* Music toggle */
let music = document.getElementById("bgMusic");
let playing = false;

function toggleMusic(){
    if(!playing){
        music.play();
        playing = true;
    }else{
        music.pause();
        playing = false;
    }
}

/* Fade animation on scroll */
let elements = document.querySelectorAll(".fade");

window.addEventListener("scroll", ()=>{
    let trigger = window.innerHeight * 0.85;

    elements.forEach(el=>{
        let top = el.getBoundingClientRect().top;

        if(top < trigger){
            el.classList.add("show");
        }
    });
});

/* Hearts generator */
setInterval(()=>{
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = Math.random()*20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove()},6000);
},300);

</script>

</body>
</html>
